    <title>Color Palettes</title>
    <style>
        .color-box {
            width: 125px;
            height: 125px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0px;
            position: relative;
            font-weight: bold;
        }
        .color-box span {
            background-color: white;
            color: #222222;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .palette-container {
            display: flex;
            flex-wrap: wrap;
            margin-top: 1em;
        }
    </style>
</head>

        <option value="nordDark">Nord Dark</option>
        <option value="dracula">Dracula</option>

        function resolveForegroundColor(backgroundColor) {
            if (!/^#[0-9A-Fa-f]{8}$/.test(backgroundColor)) {
                throw new Error("Invalid color format. Expected #rrggbbaa.");
            }
            const r = parseInt(backgroundColor.slice(1, 3), 16);
            const g = parseInt(backgroundColor.slice(3, 5), 16);
            const b = parseInt(backgroundColor.slice(5, 7), 16);
            const a = parseInt(backgroundColor.slice(7, 9), 16) / 255;
            const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            const textColor = luminance > 128 ? '#000000' : '#FFFFFF';
            return `${textColor}${Math.round(a * 255).toString(16).padStart(2, '0')}`;
        }

        const selectElement = document.getElementById('palette-select');
        const checkboxElement = document.getElementById('rgba-checkbox');
        const paletteContainer = document.getElementById('palette-container');

        function updatePalette() {
            const selectedPalette = selectElement.value;
            const map = palettes[selectedPalette];
            paletteContainer.innerHTML = ''; // Clear previous palette
            for (const [key, value] of map.entries()) {
                const colorBox = document.createElement('div');
                colorBox.className = 'color-box';
                colorBox.style.backgroundColor = value;
                const colorValue = document.createElement('span');
                var v = value.toUpperCase();
                if (v.endsWith('FF')) {
                    if (checkboxElement.checked) {
                        colorValue.textContent = "0x" + v.substring(1);
                    } else {
                        colorValue.textContent = "0x" + v.substring(1).substring(0, 6);
                    }
                } else {
                    colorValue.textContent = "0x" + v.substring(1);
                }
                colorBox.appendChild(colorValue);
                const colorName = document.createElement('span');
                //colorName.style = "user-select: none;";
                colorName.textContent = key;
                colorName.style.backgroundColor = value;
                colorName.style.color = resolveForegroundColor(value);
                colorBox.appendChild(colorName);
                paletteContainer.appendChild(colorBox);
            }
        }

        selectElement.addEventListener('change', updatePalette);
        checkboxElement.addEventListener('change', updatePalette);

        // Initialize with the first palette
        updatePalette();
